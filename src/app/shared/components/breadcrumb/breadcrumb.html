@if (breadcrumbs().length > 0) {
  <nav class="container mx-auto px-4 py-4 max-w-7xl">
    <ol class="flex items-center space-x-2 text-xs font-bold uppercase tracking-widest overflow-x-auto no-scrollbar">
      @for (breadcrumb of breadcrumbs(); track breadcrumb.url; let last = $last) {
        <li class="flex items-center flex-shrink-0">
          @if (!last) {
            <a 
              [routerLink]="[breadcrumb.url]" 
              class="text-gray-400 hover:text-primary transition-colors duration-200"
            >
              {{ breadcrumb.label }}
            </a>
            <i class="fa-solid fa-chevron-right mx-3 text-[8px] text-gray-300"></i>
          } @else {
            <span class="text-text-primary">{{ breadcrumb.label }}</span>
          }
        </li>
      }
    </ol>
  </nav>
}
